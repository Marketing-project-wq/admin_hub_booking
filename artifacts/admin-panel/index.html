<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>20FIT Admin Panel</title>
    <meta name="description" content="20FIT Admin Panel — built on Replit. Update this description to reflect the app." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="20FIT Admin Panel" />
    <meta property="og:description" content="20FIT Admin Panel — built on Replit. Update this description to reflect the app." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="20FIT Admin Panel" />
    <meta name="twitter:description" content="20FIT Admin Panel — built on Replit. Update this description to reflect the app." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 20FIT Design System · Glass Minimalist — Barlow Condensed (display/label), JetBrains Mono (data), Manrope (body) -->
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:ital,wght@0,600;0,700;0,800;0,900;1,700;1,800&family=JetBrains+Mono:wght@400;500;600&family=Manrope:wght@200;400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- No-flash theme: apply the saved theme before first paint -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('admin_theme');
          document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : 'light');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
